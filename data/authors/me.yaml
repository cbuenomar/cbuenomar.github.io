bio: "I am a Ph.D Researcher in Education Policy at the Autonomous University of Barcelona.

  My research focuses on the role that geography plays in access to educational opportunities.

  Particularly, I focus on utilizing geospatial approaches and methods to inform educational planning and policymaking processes.\n"

